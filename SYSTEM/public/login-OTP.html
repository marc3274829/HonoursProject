<!DOCTYPE html>
<html lang="en">
<script src="script-ML.js"></script>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Magic Link Login</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="authenticationType">
        One-Time Passcode Authentication
    </div>
    <div class="emailReminder">
        Your email is:<br>
        <Strong>user@gmail.com</Strong>
    </div>
    <div id="modal" style="display:none; position:fixed; top:0; left:0; width:100%; height:100%; 
      background:rgba(0,0,0,0.5); justify-content:center; align-items:center; z-index:1000;">
    <div style="background:#fff; padding:20px 30px; border-radius:8px; text-align:center; min-width:250px;">
      <p id="modalMessage"></p>
      <input type="text" id="otpInput" placeholder="Enter OTP" style="display:none; margin-top:10px; padding:5px;">
      <button id="modalOk" style="margin-top:15px; padding:5px 15px;">OK</button>
    </div>
    </div>
    <div class="formBox">
        <div class="formHeader">
            <h2> Log-in </h2>
        </div>
        <form id="otpForm" autocomplete="off">
            <div class="formInput">
                <p>Email</p>
                    <input type="text" name="email" required>
            </div>
            <div class="button">
                <button id="sButton" class="submit" type="submit">Submit</button>
            </div>
        </form>
        <p id="attemptDisplay">Attempts remaining: 3</p>
    </div>

</body>
<script>
window.addEventListener("DOMContentLoaded", () => {

    const emailForm = document.getElementById('otpForm');
    const modal = document.getElementById('modal');
    const modalMessage = document.getElementById('modalMessage');
    const modalOk = document.getElementById('modalOk');
    const otpInput = document.getElementById('otpInput');
    const attemptDisplay = document.getElementById('attemptDisplay');

    let currentEmail = "";
    let hardData = "authenticationtestemail123@gmail.com";
    let attempts = 3;
    let emailAttempts = 3;

    function updateAttemptDisplay() {
        attemptDisplay.textContent = "Attempts remaining: " + emailAttempts;
    }

    function showModal(message, showOtp = false) {
        modalMessage.textContent = message;
        otpInput.style.display = showOtp ? 'block' : 'none';
        modal.style.display = 'flex';
    }

    modalOk.addEventListener('click', async () => {

        // OTP verification stage
        if (otpInput.style.display === 'block') {
            const otp = otpInput.value.trim();
            if (!otp) return;

            try {
                const res = await fetch('/verify-otp', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ email: hardData, otp })
                });

                const data = await res.json();

                if (data.success) {
                    showModal("OTP verified! Login successful.");
                    otpInput.style.display = 'none';
                    return;
                }

                attempts--;

                if (attempts <= 0) {
                    showModal("You have ran out of attempts, we will now skip you to the questionnaire");
                    otpInput.style.display = 'none';
                    return;
                }

                showModal("Invalid OTP. Attempts remaining: " + attempts, true);
                otpInput.value = "";

            } catch (err) {
                showModal("Server error");
            }

            return;
        }

        // normal modal close
        modal.style.display = 'none';

        if (modalMessage.textContent === "OTP verified! Login successful.") {
            window.location.href = "confirmationOTP.html";
        }

        if (modalMessage.textContent ===
            "You have ran out of attempts, we will now skip you to the questionnaire") {
            window.location.href = "confirmationOTP.html";
        }
    });

    emailForm.addEventListener('submit', async (e) => {
        e.preventDefault();

        const email = emailForm.email.value.trim();
        if (!email) return;

        currentEmail = email;

        // error: wrong email (no OTP request)
        if (email !== "user@gmail.com") {
            emailAttempts--;
            updateAttemptDisplay();

            showModal("Invalid email");

            if (emailAttempts <= 0) {
                showModal("You have ran out of attempts, we will now skip you to the questionnaire");
            }
            return;
        }

        try {
            const res = await fetch('/send-otp', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ email: hardData })
            });

            const data = await res.json();

            if (data.success) {
                showModal(data.message, true); // open OTP modal
            } else {
                emailAttempts--;
                updateAttemptDisplay();

                showModal(data.message || "Failed to send OTP");

                if (emailAttempts <= 0) {
                    showModal("You have ran out of attempts, we will now skip you to the questionnaire");
                }
            }

        } catch (err) {
            showModal("Server error");
        }
    });
});
</script>
</html>
